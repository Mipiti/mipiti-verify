\* TLC configuration for Tier2Rendering — runner-side single-path render
\*
\* Two assertions, two assertion types, three distinct token sentinels
\* (gives enough range to exhibit the fresh-mint property in BFS).

CONSTANTS
    A1 = A1
    A2 = A2
    TypeFnExists = TypeFnExists
    TypeFileExists = TypeFileExists
    Tok1 = Tok1
    Tok2 = Tok2
    Tok3 = Tok3
    NoToken = NoToken
    RUnstarted = RUnstarted
    RMinted = RMinted
    RRendered = RRendered
    RSent = RSent
    RDiscarded = RDiscarded
    PValid = PValid
    PMissingType = PMissingType
    PMissingParams = PMissingParams

SPECIFICATION Spec

INVARIANTS
    Invariant

\* The model terminates intentionally — once every assertion reaches
\* evaluated = TRUE, no further Next-state action is enabled. TLC's
\* deadlock check would flag that as an error, but it's the expected
\* end of the run, not a missing transition. Disable the check (the
\* standard TLC idiom per the TLA+ user guide / Specifying Systems
\* for specs that are supposed to terminate). Safety invariants above
\* are checked on every reachable state regardless of this flag.
CHECK_DEADLOCK FALSE
