SPECIFICATION Spec

CONSTANTS
    \* Two values: one registry-mapped (san_gh_a → iss_gh) and one
    \* self-hosted (san_self, no registry entry). The minimum to
    \* falsify the issuer-resolution invariants in both directions.
    Identities = {"san_gh_a", "san_self"}
    Issuers    = {"iss_gh", "iss_self"}
    Fingerprints = {"fp_a", "fp_b"}
    Hashes     = {"h1", "h2"}
    ModelIds   = {"m1", "m2"}
    CommitShas = {"c1", "c2"}
    \* NONE and ABSENT are TLC model values (not strings). String
    \* values would cause "Attempted to compare record with non-record"
    \* errors when TLC evaluates set-membership for unions like
    \* `Bundle \cup {ABSENT}` — TLC tries to compare each record-typed
    \* element against the string and rejects the heterogeneous
    \* comparison. Model values compare by identity (name) so
    \* `record \in {ABSENT}` is just False without trying to do
    \* structural comparison.
    NONE       = NONE
    ABSENT     = ABSENT
    SAN_PREFIX_REGISTRY <- SAN_PREFIX_REGISTRY_DEFAULT

INVARIANTS
    TypeOK
    SecurityInvariants
