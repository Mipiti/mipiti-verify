SPECIFICATION Spec

CONSTANTS
    \* Two values: one registry-mapped (san_gh_a → iss_gh) and one
    \* self-hosted (san_self, no registry entry). The minimum to
    \* falsify the issuer-resolution invariants in both directions.
    \* Identities and Issuers stay as strings: SAN_PREFIX_REGISTRY_DEFAULT
    \* in audit.tla maps the literal string "san_gh_a" to "iss_gh", and the
    \* registry is asymmetric (only san_gh_a is mapped). Model-value-ifying
    \* these would break that mapping, and they're excluded from SYMMETRY
    \* anyway.
    Identities = {"san_gh_a", "san_self"}
    Issuers    = {"iss_gh", "iss_self"}
    \* The remaining four constants are declared as TLC model values (no
    \* quotes around the elements). This is required by SYMMETRY: TLC's
    \* permutation quotient only operates on model values, not strings.
    \* Equality semantics are identical (model values compare by identity
    \* / name), so the spec's structural comparisons (= and #) behave the
    \* same; only TLC's state-graph deduplication changes.
    Fingerprints = {fp_a, fp_b}
    Hashes       = {h1, h2}
    ModelIds     = {m1, m2}
    CommitShas   = {c1, c2}
    \* NONE and ABSENT are TLC model values (not strings). String
    \* values would cause "Attempted to compare record with non-record"
    \* errors when TLC evaluates set-membership for unions like
    \* `Bundle \cup {ABSENT}` — TLC tries to compare each record-typed
    \* element against the string and rejects the heterogeneous
    \* comparison. Model values compare by identity (name) so
    \* `record \in {ABSENT}` is just False without trying to do
    \* structural comparison.
    NONE       = NONE
    ABSENT     = ABSENT
    SAN_PREFIX_REGISTRY <- SAN_PREFIX_REGISTRY_DEFAULT

SYMMETRY Symmetry

INVARIANTS
    TypeOK
    SecurityInvariants
