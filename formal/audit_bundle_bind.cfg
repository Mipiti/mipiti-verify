\* audit_bundle_bind.cfg — Config 2 of the compositional split.
\*
\* Explores the full bundle_bind cross-product (Init_bind in
\* audit.tla pins ws_sig=ABSENT and all pins=NONE — neither
\* dimension affects the bundle-bind invariants I8 and I14, nor
\* the V1/V2 cases whose preconditions reference bundle_bind).
\*
\* See formal/COMPOSITION.md for the partition argument.

SPECIFICATION Spec_bind

CONSTANTS
    Identities = {"san_gh_a", "san_self"}
    Issuers    = {"iss_gh", "iss_self"}
    Fingerprints = {fp_a, fp_b}
    Hashes       = {h1, h2}
    ModelIds     = {m1, m2}
    CommitShas   = {c1, c2}
    NONE       = NONE
    ABSENT     = ABSENT
    SAN_PREFIX_REGISTRY <- SAN_PREFIX_REGISTRY_DEFAULT

    KS_SIGSTORE  = KS_SIGSTORE
    KS_PLATFORM  = KS_PLATFORM
    KS_WORKSPACE = KS_WORKSPACE
    KS_ORPHAN    = KS_ORPHAN
    KS_LEGACY    = KS_LEGACY

SYMMETRY Symmetry

INVARIANTS
    TypeOK
    ConfigBindInvariants
