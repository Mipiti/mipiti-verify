\* audit_main.cfg — Config 1 of the compositional split.
\*
\* Pins bundle_bind to its canonical "matching, valid" representative
\* (Init_main in audit.tla) and verifies the subset of invariants
\* whose truth value is independent of bundle_bind under that pinning
\* — I1–I7, I9–I13, V3 — plus a composition lemma that mechanically
\* proves the pinning is precision-preserving on this state space.
\*
\* See formal/COMPOSITION.md for the partition argument.

SPECIFICATION Spec_main

CONSTANTS
    Identities = {"san_gh_a", "san_self"}
    Issuers    = {"iss_gh", "iss_self"}
    Fingerprints = {fp_a, fp_b}
    Hashes       = {h1, h2}
    ModelIds     = {m1, m2}
    CommitShas   = {c1, c2}
    NONE       = NONE
    ABSENT     = ABSENT
    SAN_PREFIX_REGISTRY <- SAN_PREFIX_REGISTRY_DEFAULT

    KS_SIGSTORE      = KS_SIGSTORE
    KS_PLATFORM      = KS_PLATFORM
    KS_WORKSPACE     = KS_WORKSPACE
    KS_CUSTOMER_DSSE = KS_CUSTOMER_DSSE
    KS_ORPHAN        = KS_ORPHAN
    KS_LEGACY        = KS_LEGACY

SYMMETRY Symmetry

\* Lossless state-space reduction: collapses ONLY the
\* customer_dsse-specific (dsse_predicate_* × pins.model_id/commit_sha)
\* × customer_key_fp_match cross-product (162 raw -> 18 observable
\* classes). Identity on every non-customer_dsse state. Faithfulness
\* is proven by formal/check_audit_view_faithful.py (every cfg
\* invariant observes the collapsed fields only via (in)equality) and
\* corroborated by a mutation test. See formal/COMPOSITION.md.
VIEW AuditView

INVARIANTS
    TypeOK
    ConfigMainInvariants
