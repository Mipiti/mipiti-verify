name: Publish to PyPI + GHCR

# Triggers on merge of a `chore: release vX.Y.Z` PR to main (or manual
# workflow_dispatch with a version input for re-runs).
#
# Ordering rationale: we publish PyPI + Docker FIRST, then dispatch the
# action-image pin. The git tag is *not* created here — it's created
# later by update-readme-pin.yml after the pin PR auto-merges, pointing
# at the pin commit so `git checkout vX.Y.Z` always lands on the
# digest-pinned action.yml state.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v0.26.5). Only needed for manual re-runs."
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: mipiti/mipiti-verify

jobs:
  build-and-publish:
    # Fire only when the push's head-commit subject is a release-PR merge,
    # or on an explicit manual dispatch with a version input.
    if: "github.event_name == 'workflow_dispatch' || startsWith(github.event.head_commit.message, 'chore: release v')"
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read   # no longer creates releases — that's moved to update-readme-pin.yml
      packages: write  # push to GHCR
      id-token: write  # OIDC for PyPI trusted publishing + Sigstore attestation
      attestations: write  # GitHub artifact attestation

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # No step in this workflow does `git push` / `git commit` — all
          # mutations flow through `gh api` with explicitly-scoped tokens.
          # Dropping the checkout token from .git/config eliminates the
          # belt-and-suspenders path where a later step could accidentally
          # reuse it.
          persist-credentials: false

      # --- PyPI publish ---

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install build tools (hash-pinned)
        run: pip install --require-hashes -r requirements-build.lock

      - name: Build package
        run: python -m build

      - name: Verify package
        run: twine check dist/*

      - name: Attest build provenance (Sigstore)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # v1.13.0

      # --- Docker image publish ---

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        # `${{ ... }}` values are placed into env before bash runs (GitHub's
        # recommended injection-safe pattern); the script then references
        # them as plain shell variables which go through quoting rules
        # rather than string substitution.
        env:
          VERSION_INPUT: ${{ github.event.inputs.version }}
        run: |
          # Prefer workflow_dispatch input; fall back to parsing the release
          # commit subject on push triggers (e.g. "chore: release v0.26.5").
          if [ -n "$VERSION_INPUT" ]; then
            # Strict validation: exactly vN.N.N, no shell metacharacters.
            # workflow_dispatch requires repo-write access, but defense in
            # depth: any bad value (compromised credentials, typo'd input)
            # fails the workflow here before it reaches PyPI / Docker push.
            if ! printf '%s' "$VERSION_INPUT" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "Invalid version input: $VERSION_INPUT" >&2
              exit 1
            fi
            TAG="$VERSION_INPUT"
          else
            SUBJECT=$(git log -1 --format=%s HEAD)
            TAG=$(printf '%s' "$SUBJECT" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
          fi
          if [ -z "$TAG" ]; then
            echo "Could not determine release version" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Publishing $TAG"

      - name: Build and push Docker image
        id: docker
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      # Release creation moved to update-readme-pin.yml so that the tag is
      # created at the pin commit (digest-pinned action.yml) rather than at
      # the release commit (pre-pin). The rich "Docker Image" note is built
      # there by reading action.yml, which by then contains the digest-pinned
      # `image: docker://...@sha256:...` reference.

      - name: Generate dispatch token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859  # v3.0.0
        id: app-token
        with:
          app-id: ${{ secrets.DISPATCH_APP_ID }}
          private-key: ${{ secrets.DISPATCH_APP_PRIVATE_KEY }}
          owner: Mipiti
          repositories: mipiti-verify

      - name: Dispatch action.yml image update
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG: ${{ steps.version.outputs.tag }}
          DIGEST: ${{ steps.docker.outputs.digest }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          gh api repos/Mipiti/mipiti-verify/dispatches \
            -f event_type=action-image-update \
            -f "client_payload[tag]=$TAG" \
            -f "client_payload[digest]=$DIGEST" \
            -f "client_payload[image]=$IMAGE"
