name: Publish to PyPI + GHCR

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: mipiti/mipiti-verify

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write  # create/edit releases
      packages: write  # push to GHCR
      id-token: write  # OIDC for PyPI trusted publishing + Sigstore attestation
      attestations: write  # GitHub artifact attestation

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # --- PyPI publish ---

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install build tools (hash-pinned)
        run: pip install --require-hashes -r requirements-build.lock

      - name: Build package
        run: python -m build

      - name: Verify package
        run: twine check dist/*

      - name: Attest build provenance (Sigstore)
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2.4.0
        with:
          subject-path: dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # v1.13.0

      # --- Docker image publish ---

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        id: docker
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83  # v6.18.0
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Add Docker image reference to release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DIGEST="${{ steps.docker.outputs.digest }}"
          TAG="${{ steps.version.outputs.tag }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}@${DIGEST}"

          DOCKER_NOTE=$(cat <<NOTES

          ---

          ### Docker Image

          Pre-built image for faster CI (pulls cached image instead of building from source):

          \`\`\`yaml
          - uses: docker://${IMAGE}
          \`\`\`

          Image: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}\`
          Digest: \`${DIGEST}\`
          NOTES
          )

          EXISTING=$(gh release view "$TAG" --json body --jq '.body' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            gh release edit "$TAG" --notes "${EXISTING}${DOCKER_NOTE}"
          else
            gh release create "$TAG" --title "$TAG" --notes "$DOCKER_NOTE" --verify-tag
          fi
          echo "Updated release ${TAG} with Docker image reference"

      - name: Generate dispatch token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859  # v3.0.0
        id: app-token
        with:
          app-id: ${{ secrets.DISPATCH_APP_ID }}
          private-key: ${{ secrets.DISPATCH_APP_PRIVATE_KEY }}
          owner: Mipiti
          repositories: mipiti-verify

      - name: Dispatch action.yml image update
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api repos/Mipiti/mipiti-verify/dispatches \
            -f event_type=action-image-update \
            -f "client_payload[tag]=${{ steps.version.outputs.tag }}" \
            -f "client_payload[digest]=${{ steps.docker.outputs.digest }}" \
            -f "client_payload[image]=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
