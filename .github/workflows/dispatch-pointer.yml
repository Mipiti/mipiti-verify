name: Dispatch Pointer Update

# Fires only when a release tag lands on this repo. One pointer-update
# PR per release, instead of three (one each for release-commit,
# pin-commit, README-update-commit).
#
# Rationale: parent repo should track verify's latest *released* version
# (what users consume via `pip install` or `uses: @vX.Y.Z`), not every
# intermediate commit in a mid-release state. With Option 3
# (update-readme-pin.yml creates the tag at the pin commit), this
# trigger fires *after* all release-process commits have landed, so the
# pointer always points at the final digest-pinned state.

on:
  push:
    tags: ['v*']

jobs:
  dispatch-submodule-update:
    runs-on: ubuntu-latest
    environment: dispatch
    permissions:
      contents: read
    steps:
      - uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859  # v3.0.0
        id: app-token
        with:
          app-id: ${{ secrets.DISPATCH_APP_ID }}
          private-key: ${{ secrets.DISPATCH_APP_PRIVATE_KEY }}
          owner: Mipiti
          repositories: mipiti

      - name: Trigger submodule update in parent repo
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api repos/Mipiti/mipiti/dispatches \
            -f event_type=submodule-update \
            -f 'client_payload[submodule]=verify' \
            -f 'client_payload[ref]=${{ github.sha }}'
